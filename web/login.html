<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Pulsewave"/>
  <meta name="theme-color" content="#080808"/>
  <title>Pulsewave</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="/css/login.css"/>
  <style>
    .titlebar { display: none; }
    html, body { overflow: auto; }
    .login-container { padding-top: env(safe-area-inset-top, 20px); }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="login-container">
    <div class="brand">
      <div class="logo-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" fill="#FFD600" opacity="0.15"/>
          <path d="M14 34 L14 18 L28 14 L28 26" stroke="#FFD600" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="11" cy="34" r="3" fill="#FFD600"/>
          <circle cx="25" cy="26" r="3" fill="#FFD600"/>
        </svg>
      </div>
      <h1>Pulsewave</h1>
      <p>Your music, your way.</p>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Create Account</button>
      </div>

      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="Enter your username" autocomplete="username" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password" required/>
        </div>
        <div class="error" id="login-error"></div>
        <button type="submit" class="btn-primary">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="reg-user" placeholder="Choose a username" autocomplete="username" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Choose a password" autocomplete="new-password" required/>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="reg-pass2" placeholder="Repeat your password" autocomplete="new-password" required/>
        </div>
        <div class="error" id="reg-error"></div>
        <button type="submit" class="btn-primary">
          <span>Create Account</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
  <script src="/js/pw-web.js"></script>
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('pw_session');
        if (saved) {
          const s = JSON.parse(saved);
          if (s?.userId && s?.username) { window.location.href = '/app'; }
        }
      } catch {}
    })();

    function showTab(t) {
      document.getElementById('form-login').style.display    = t === 'login'    ? 'flex' : 'none';
      document.getElementById('form-register').style.display = t === 'register' ? 'flex' : 'none';
      document.getElementById('tab-login').classList.toggle('active', t === 'login');
      document.getElementById('tab-register').classList.toggle('active', t === 'register');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const err = document.getElementById('login-error');
      err.textContent = '';
      btn.disabled = true;
      const r = await pw.login({
        username: document.getElementById('login-user').value.trim(),
        password: document.getElementById('login-pass').value
      });
      btn.disabled = false;
      if (r.ok) {
        pw.goToApp({ userId: r.userId, username: r.username, isPremium: r.isPremium });
      } else {
        err.textContent = r.error;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const err = document.getElementById('reg-error');
      err.textContent = '';
      const pass  = document.getElementById('reg-pass').value;
      const pass2 = document.getElementById('reg-pass2').value;
      if (pass !== pass2)  { err.textContent = 'Passwords do not match'; return; }
      if (pass.length < 4) { err.textContent = 'Password must be at least 4 characters'; return; }
      btn.disabled = true;
      const r = await pw.register({
        username: document.getElementById('reg-user').value.trim(),
        password: pass
      });
      btn.disabled = false;
      if (r.ok) {
        pw.goToApp({ userId: r.userId, username: r.username, isPremium: false });
      } else {
        err.textContent = r.error;
      }
    }
  </script>
</body>
</html>
