name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Download yt-dlp for Windows
        run: |
          mkdir -p bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o bin/yt-dlp.exe
        shell: bash
      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
      - name: Upload Windows build
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Pulsewave-Setup-*.exe
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Download yt-dlp for macOS
        run: |
          mkdir -p bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o bin/yt-dlp
          chmod +x bin/yt-dlp
      - name: Build macOS app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload macOS build
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Pulsewave-Mac-*.dmg
            dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-website-version:
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          repository: welias123/pulsewave-website
          token: ${{ secrets.GITHUB_TOKEN }}
          path: website
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Update version in website
        run: |
          cd website
          MAJOR_MINOR=$(echo "${{ steps.version.outputs.VERSION }}" | cut -d. -f1-2)
          sed -i "s/v[0-9]\+\.[0-9]\+ · Automatische Updates/v${MAJOR_MINOR} · Automatische Updates/g" index.html
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: auto-update version to v${MAJOR_MINOR}"
          git push
