<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulsewave</title>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body>
  <!-- Titlebar -->
  <div class="titlebar">
    <div class="drag-region"></div>
    <div class="win-controls">
      <button onclick="pw.minimize()">─</button>
      <button onclick="pw.maximize()">□</button>
      <button class="close" onclick="pw.close()">✕</button>
    </div>
  </div>

  <!-- Background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="login-container">
    <div class="brand">
      <div class="logo-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" fill="#FFD600" opacity="0.15"/>
          <path d="M14 34 L14 18 L28 14 L28 26" stroke="#FFD600" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="11" cy="34" r="3" fill="#FFD600"/>
          <circle cx="25" cy="26" r="3" fill="#FFD600"/>
        </svg>
      </div>
      <h1>Pulsewave</h1>
      <p>Your music, your way.</p>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="showTab('register')">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="Enter your username" autocomplete="username" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password" required/>
        </div>
        <div class="error" id="login-error"></div>
        <button type="submit" class="btn-primary">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <!-- Register Form -->
      <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="reg-user" placeholder="Choose a username" autocomplete="username" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="Choose a password" autocomplete="new-password" required oninput="checkStrength(this.value)"/>
          <div id="strength-wrap" style="display:none;margin-top:6px">
            <div style="height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden">
              <div id="strength-bar" style="height:100%;width:0%;border-radius:2px;transition:width .25s,background .25s"></div>
            </div>
            <div id="strength-label" style="font-size:11px;margin-top:4px;color:#666"></div>
          </div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="reg-pass2" placeholder="Repeat your password" autocomplete="new-password" required/>
        </div>
        <div class="error" id="reg-error"></div>
        <button type="submit" class="btn-primary">
          <span>Create Account</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    // ── Auto-login: check saved session ──────────────────────────────────────
    (function() {
      try {
        const saved = localStorage.getItem('pw_session');
        if (saved) {
          const session = JSON.parse(saved);
          if (session?.userId && session?.username) {
            // Pass cached isPremium so premium survives db.json loss / server outage
            const isPremiumLocal = localStorage.getItem('pw_isPremium') === '1';
            pw.goToApp({ ...session, isPremiumLocal });
          }
        }
      } catch {}
    })();

    function saveSession(data) {
      try { localStorage.setItem('pw_session', JSON.stringify(data)); } catch {}
    }

    function showTab(t) {
      document.getElementById('form-login').style.display    = t === 'login'    ? 'flex' : 'none';
      document.getElementById('form-register').style.display = t === 'register' ? 'flex' : 'none';
      document.getElementById('tab-login').classList.toggle('active', t === 'login');
      document.getElementById('tab-register').classList.toggle('active', t === 'register');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const err = document.getElementById('login-error');
      err.textContent = '';
      btn.disabled = true;
      const r = await pw.login({
        username: document.getElementById('login-user').value.trim(),
        password: document.getElementById('login-pass').value
      });
      btn.disabled = false;
      if (r.ok) {
        saveSession({ userId: r.userId, username: r.username });
        pw.goToApp({ userId: r.userId, username: r.username, isPremiumLocal: r.isPremiumLocal || false });
      } else {
        err.textContent = r.error;
      }
    }

    function checkStrength(p) {
      const wrap = document.getElementById('strength-wrap');
      const bar  = document.getElementById('strength-bar');
      const lbl  = document.getElementById('strength-label');
      if (!p) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      let s = 0;
      if (p.length >= 6)  s++;
      if (p.length >= 10) s++;
      if (/[A-Z]/.test(p)) s++;
      if (/[0-9]/.test(p)) s++;
      if (/[^a-zA-Z0-9]/.test(p)) s++;
      const lvl = [
        { w:'20%', c:'#ef4444', t:'Very weak' },
        { w:'40%', c:'#f97316', t:'Weak' },
        { w:'60%', c:'#eab308', t:'Fair' },
        { w:'80%', c:'#22c55e', t:'Strong' },
        { w:'100%',c:'#16a34a', t:'Very strong' },
      ][Math.max(0, s - 1)];
      bar.style.width = lvl.w; bar.style.background = lvl.c;
      lbl.style.color = lvl.c; lbl.textContent = lvl.t;
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const err = document.getElementById('reg-error');
      err.textContent = '';
      const pass  = document.getElementById('reg-pass').value;
      const pass2 = document.getElementById('reg-pass2').value;
      if (pass !== pass2) { err.textContent = 'Passwords do not match'; return; }
      if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters'; return; }
      btn.disabled = true;
      const r = await pw.register({
        username: document.getElementById('reg-user').value.trim(),
        password: pass
      });
      btn.disabled = false;
      if (r.ok) {
        saveSession({ userId: r.userId, username: r.username });
        pw.goToApp({ userId: r.userId, username: r.username, isPremiumLocal: false });
      } else {
        err.textContent = r.error;
      }
    }
  </script>
</body>
</html>
